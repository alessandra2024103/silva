<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePlay | Assinar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #9b9595; color: white; }
        .bg-netflix-dark { background-color: rgba(114, 114, 114, 0.95); }
        .text-netflix-red { color: #e50914; }
        .btn-netflix-red { background-color: #e50914; color: white; }
        .btn-netflix-red:hover { background-color: #b30710; color: white; }
    </style>
</head>
<body>

    <header class="navbar navbar-expand navbar-dark bg-netflix-dark fixed-top px-4 border-bottom border-secondary border-opacity-25">
        <div class="container-fluid">
            <a class="navbar-brand text-netflix-red fw-bold fs-3" href="index.html">CINEPLAY</a>
            <div class="navbar-nav ms-auto fw-bold">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link" href="catalogo.html">Catálogo</a>
            </div>
        </div>
    </header>

    <!-- Container centralizado verticalmente usando Flexbox nativo do Bootstrap -->
    <main class="container d-flex align-items-center justify-content-center" style="min-height: 85vh; margin-top: 80px;">
        <div class="card bg-dark text-white p-4 rounded shadow-lg border-0" style="max-width: 450px; width: 100%;">
            <div class="card-body">
                <h2 class="card-title fw-bold mb-4 text-center">Crie sua conta</h2>
                <form>
                    <div class="mb-3">
                        <input type="text" class="form-control form-control-lg bg-secondary bg-opacity-25 text-white border-0" placeholder="Nome Completo" required>
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control form-control-lg bg-secondary bg-opacity-25 text-white border-0" placeholder="E-mail" required>
                    </div>
                    <div class="mb-4">
                        <select class="form-select form-select-lg bg-secondary bg-opacity-25 text-white border-0 text-light">
                            <option class="text-dark">Plano Básico - R$ 19,90</option>
                            <option class="text-dark">Plano Premium - R$ 39,90</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-netflix-red btn-lg w-100 fw-bold py-2">Assinar Agora</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-secondary border-top border-dark">
        <p>&copy; 2026 CinePlay - Inspirado no Multiverso.</p>
    </footer>
</body>
</html>
